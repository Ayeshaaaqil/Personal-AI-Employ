name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      hf_token:
        description: 'Hugging Face Token'
        required: true

env:
  HF_REPO: Ayesha-Aaqil/ai-employee

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install huggingface_hub gradio google-auth google-auth-oauthlib google-api-python-client playwright python-dotenv requests
    
    - name: 📋 Prepare deployment files
      run: |
        mkdir -p deployment/huggingface_space
        cp web_dashboard/app.py deployment/huggingface_space/app.py
        
        cat > deployment/huggingface_space/requirements.txt << EOF
        gradio>=4.0.0
        google-auth>=2.0.0
        google-auth-oauthlib>=1.0.0
        google-api-python-client>=2.0.0
        playwright>=1.40.0
        python-dotenv>=1.0.0
        requests>=2.31.0
        EOF
        
        cat > deployment/huggingface_space/README.md << 'EOF'
        ---
        title: AI Employee Dashboard
        emoji: 🤖
        colorFrom: indigo
        colorTo: purple
        sdk: gradio
        sdk_version: 4.44.1
        app_file: app.py
        pinned: false
        license: mit
        ---
        
        # 🤖 AI Employee Dashboard
        
        **Your life and business on autopilot!**
        
        Created by: **Ayesha Aaqil**
        EOF
    
    - name: 🚀 Deploy to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN || github.event.inputs.hf_token }}
      run: |
        python deployment/deploy_to_huggingface.py \
          --repo $HF_REPO \
          --token $HF_TOKEN
    
    - name: ✅ Deployment complete
      run: |
        echo "🎉 Deployment successful!"
        echo "🌐 Space URL: https://huggingface.co/spaces/$HF_REPO"

version: '3.8'

services:
  # Reasoning Engine
  reasoning-engine:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
      - HUGGINGFACE_MODEL=${HUGGINGFACE_MODEL:-meta-llama/Meta-Llama-3-70B-Instruct}
      - VAULT_PATH=/app/vault
    volumes:
      - ../AI_Employee_Vault:/app/vault
    command: >
      python platinum/huggingface_reasoning_engine.py --server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web Dashboard
  web-dashboard:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "7860:7860"
    environment:
      - VAULT_PATH=/app/vault
      - REASONING_ENGINE_URL=http://reasoning-engine:8001
    volumes:
      - ../AI_Employee_Vault:/app/vault
    depends_on:
      - reasoning-engine
    command: >
      python web_dashboard/app.py /app/vault --port 7860
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Server
  api-server:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - VAULT_PATH=/app/vault
      - REASONING_ENGINE_URL=http://reasoning-engine:8001
      - API_KEY=${API_KEY:-changeme}
    volumes:
      - ../AI_Employee_Vault:/app/vault
    depends_on:
      - reasoning-engine
    command: >
      python web_dashboard/api.py --port 8000
    restart: unless-stopped

  # Watchers (can run multiple instances)
  watcher-gmail:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    environment:
      - VAULT_PATH=/app/vault
      - GMAIL_CREDENTIALS=/app/credentials.json
    volumes:
      - ../AI_Employee_Vault:/app/vault
      - ../credentials.json:/app/credentials.json:ro
    depends_on:
      - reasoning-engine
    command: >
      python watchers/gmail_watcher.py /app/vault
    restart: unless-stopped

  watcher-linkedin:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    environment:
      - VAULT_PATH=/app/vault
    volumes:
      - ../AI_Employee_Vault:/app/vault
    depends_on:
      - reasoning-engine
    command: >
      python watchers/linkedin_watcher.py /app/vault
    restart: unless-stopped

  # Orchestrator
  orchestrator:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    environment:
      - VAULT_PATH=/app/vault
      - REASONING_ENGINE_URL=http://reasoning-engine:8001
    volumes:
      - ../AI_Employee_Vault:/app/vault
    depends_on:
      - reasoning-engine
      - web-dashboard
    command: >
      python orchestrator.py /app/vault
    restart: unless-stopped

# Volumes
volumes:
  vault_data:
